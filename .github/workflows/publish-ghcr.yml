name: Publish Docker Compose Image

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/reuben-geonet/gns-netbox

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image with Docker Compose
        env:
          NETBOX_IMAGE: ${{ env.IMAGE_NAME }}:${{ github.sha }}
        run: docker compose build netbox

      - name: Tag image
        env:
          NETBOX_IMAGE: ${{ env.IMAGE_NAME }}
          SOURCE_TAG: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          tags=("${NETBOX_IMAGE}:${SOURCE_TAG}")

          if [ "${REF_TYPE}" = "tag" ]; then
            tags+=("${NETBOX_IMAGE}:${REF_NAME}")
          fi

          if [ "${REF_NAME}" = "${DEFAULT_BRANCH}" ]; then
            tags+=("${NETBOX_IMAGE}:latest")
          fi

          for tag in "${tags[@]:1}"; do
            docker tag "${NETBOX_IMAGE}:${SOURCE_TAG}" "${tag}"
          done

          printf '%s\n' "${tags[@]}" > image-tags.txt

      - name: Push image tags
        run: |
          set -euo pipefail

          while IFS= read -r tag; do
            docker push "${tag}"
          done < image-tags.txt
